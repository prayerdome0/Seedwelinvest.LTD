<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Seedwel Investment LTD</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>

    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript">
    </script>

    <style>
        :root {
            --blue: #1a2744;
            --blue-light: #1e3052;
            --blue-lighter: #243860;
            --gold: #d4a853;
            --gold-light: #e0c06e;
            --white: #ffffff;
            --gray: #a0a8b8;
            --red: #ef4444;
            --green: #22c55e;
            --shadow-gold: 0 4px 30px rgba(212, 168, 83, 0.25);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1a2e;
            color: var(--white);
            min-height: 100vh;
        }

        /* ========== LOGIN SCREEN ========== */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(30, 49, 82, 0.8);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img {
            height: 50px;
            margin-bottom: 20px;
        }
        .login-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .login-card p {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(26, 39, 68, 0.6);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 12px;
            color: var(--white);
            font-size: 0.9rem;
            margin-bottom: 12px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }
        .login-card input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.08);
        }
        .login-card .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0f1a2e;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .login-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 168, 83, 0.4);
        }
        .login-error {
            color: var(--red);
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        /* ========== DASHBOARD ========== */
        .dashboard {
            display: none;
            min-height: 100vh;
        }
        .admin-header {
            background: rgba(30, 49, 82, 0.9);
            border-bottom: 1px solid rgba(212, 168, 83, 0.2);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-header .admin-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-header img {
            height: 35px;
        }
        .admin-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
        }
        .admin-header .btn-logout {
            padding: 10px 22px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .admin-header .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .admin-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        /* Form Section */
        .admin-section {
            background: rgba(30, 49, 82, 0.6);
            border: 1px solid rgba(212, 168, 83, 0.15);
            border-radius: 18px;
            padding: 28px 24px;
        }
        .admin-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--white);
            margin-bottom: 6px;
        }
        .admin-section .section-desc {
            color: var(--gray);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: var(--gray-light);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 13px 16px;
            background: rgba(26, 39, 68, 0.6);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 12px;
            color: var(--white);
            font-size: 0.88rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.08);
        }
        .image-upload-area {
            background: rgba(26, 39, 68, 0.6);
            border: 2px dashed rgba(212, 168, 83, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
        }
        .image-upload-area:hover {
            border-color: var(--gold);
            background: rgba(26, 39, 68, 0.8);
        }
        .image-upload-area i {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 8px;
            display: block;
        }
        .image-upload-area p {
            color: var(--gray);
            font-size: 0.8rem;
        }
        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
            border: 1px solid rgba(212, 168, 83, 0.2);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #0f1a2e;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 168, 83, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .upload-status {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 8px;
            min-height: 20px;
        }
        .upload-status.success {
            color: var(--green);
        }
        .upload-status.error {
            color: var(--red);
        }

        /* Projects List */
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .project-list-item {
            display: flex;
            gap: 14px;
            align-items: center;
            background: rgba(26, 39, 68, 0.5);
            border: 1px solid rgba(212, 168, 83, 0.08);
            border-radius: 12px;
            padding: 12px 14px;
            transition: var(--transition);
        }
        .project-list-item:hover {
            border-color: rgba(212, 168, 83, 0.3);
        }
        .project-list-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .project-list-info {
            flex: 1;
            min-width: 0;
        }
        .project-list-info h5 {
            font-size: 0.85rem;
            color: var(--white);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .project-list-info p {
            font-size: 0.72rem;
            color: var(--gray);
        }
        .btn-delete {
            padding: 8px 14px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .no-projects {
            text-align: center;
            color: var(--gray);
            padding: 30px;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .admin-body {
                grid-template-columns: 1fr;
            }
            .admin-header {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== LOGIN SCREEN ========== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <img src="https://i.ibb.co/svxj52ny/seedwel.png" alt="Seedwel Investment LTD">
            <h2>Admin Panel</h2>
            <p>Sign in to manage portfolio & projects</p>
            <input type="email" id="emailInput" placeholder="Email address" value="zacheussimbaya@gmail.com">
            <input type="password" id="passwordInput" placeholder="Password">
            <button class="btn-login" id="btnLogin">
                <i class="fas fa-lock"></i> Sign In
            </button>
            <div class="login-error" id="loginError">Invalid email or password.</div>
        </div>
    </div>

    <!-- ========== DASHBOARD ========== -->
    <div class="dashboard" id="dashboard">
        <div class="admin-header">
            <div class="admin-logo">
                <img src="https://i.ibb.co/svxj52ny/seedwel.png" alt="Seedwel">
                <h3>Admin Dashboard</h3>
            </div>
            <button class="btn-logout" id="btnLogout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        <div class="admin-body">
            <!-- Add Project Form -->
            <div class="admin-section">
                <h4>Add New Project</h4>
                <p class="section-desc">Upload to portfolio via Cloudinary</p>
                <div class="form-group">
                    <label>Project Image *</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload image</p>
                        <p style="font-size:0.7rem; color:var(--gray);">(Cloudinary Upload Widget)</p>
                    </div>
                    <img src="" alt="Preview" class="image-preview" id="imagePreview">
                    <input type="hidden" id="uploadedImageUrl">
                    <div class="upload-status" id="uploadStatus"></div>
                </div>
                <div class="form-group">
                    <label>Project Name *</label>
                    <input type="text" id="projectName" placeholder="e.g. E-Commerce Website">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="projectDescription" rows="3" placeholder="Brief description of the project..."></textarea>
                </div>
                <div class="form-group">
                    <label>Amount (USD) *</label>
                    <input type="number" id="projectAmount" placeholder="e.g. 500" min="0" step="0.01">
                </div>
                <button class="btn-submit" id="btnSubmit">
                    <i class="fas fa-plus-circle"></i> Add Project
                </button>
            </div>

            <!-- Projects List -->
            <div class="admin-section">
                <h4>Existing Projects</h4>
                <p class="section-desc">Manage your portfolio items</p>
                <div class="projects-list" id="projectsList">
                    <div class="no-projects">
                        <i class="fas fa-spinner fa-spin" style="display:block; margin-bottom:8px; color:var(--gold);"></i>
                        Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyA-BpRy-RVc2rqIG6uiRu_XrGEu1ZGnQwU",
            authDomain: "seedwel-investment-limited.firebaseapp.com",
            databaseURL: "https://seedwel-investment-limited-default-rtdb.firebaseio.com",
            projectId: "seedwel-investment-limited",
            storageBucket: "seedwel-investment-limited.firebasestorage.app",
            messagingSenderId: "197778268619",
            appId: "1:197778268619:web:92f29d88fa5a22dbfa964e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // ========== CLOUDINARY CONFIG ==========
        const CLOUD_NAME = 'dhad95cch';
        const UPLOAD_PRESET = 'portfolio';

        // ========== DOM ELEMENTS ==========
        const loginScreen = document.getElementById('loginScreen');
        const dashboard = document.getElementById('dashboard');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const loginError = document.getElementById('loginError');
        const imageUploadArea = document.getElementById('imageUploadArea');
        const imagePreview = document.getElementById('imagePreview');
        const uploadedImageUrl = document.getElementById('uploadedImageUrl');
        const uploadStatus = document.getElementById('uploadStatus');
        const projectName = document.getElementById('projectName');
        const projectDescription = document.getElementById('projectDescription');
        const projectAmount = document.getElementById('projectAmount');
        const btnSubmit = document.getElementById('btnSubmit');
        const projectsList = document.getElementById('projectsList');

        // ========== AUTH STATE ==========
        auth.onAuthStateChanged((user) => {
            if (user && user.email === 'zacheussimbaya@gmail.com') {
                loginScreen.style.display = 'none';
                dashboard.style.display = 'block';
                loadProjectsList();
            } else {
                loginScreen.style.display = 'flex';
                dashboard.style.display = 'none';
                if (user && user.email !== 'zacheussimbaya@gmail.com') {
                    auth.signOut();
                    alert('Access denied. Only the assigned admin can log in.');
                }
            }
        });

        // ========== LOGIN ==========
        btnLogin.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) {
                loginError.textContent = 'Please enter email and password.';
                loginError.style.display = 'block';
                return;
            }
            if (email !== 'zacheussimbaya@gmail.com') {
                loginError.textContent = 'Access denied. Only the assigned admin can log in.';
                loginError.style.display = 'block';
                return;
            }
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            loginError.style.display = 'none';
            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    loginError.textContent = error.message;
                    loginError.style.display = 'block';
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="fas fa-lock"></i> Sign In';
                });
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnLogin.click();
        });

        // ========== LOGOUT ==========
        btnLogout.addEventListener('click', () => {
            auth.signOut();
            uploadedImageUrl.value = '';
            imagePreview.style.display = 'none';
            imagePreview.src = '';
            uploadStatus.textContent = '';
            projectName.value = '';
            projectDescription.value = '';
            projectAmount.value = '';
        });

        // ========== CLOUDINARY UPLOAD WIDGET ==========
        const cloudinaryWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME,
            uploadPreset: UPLOAD_PRESET,
            sources: ['local', 'url', 'camera'],
            multiple: false,
            maxFileSize: 10000000,
            cropping: true,
            showAdvancedOptions: false,
            styles: {
                palette: {
                    window: '#1e3052',
                    windowBorder: '#d4a853',
                    tabIcon: '#d4a853',
                    menuIcons: '#d4a853',
                    textDark: '#ffffff',
                    textLight: '#a0a8b8',
                    link: '#d4a853',
                    action: '#d4a853',
                    inactiveTabIcon: '#a0a8b8',
                    error: '#ef4444',
                    inProgress: '#d4a853',
                    complete: '#22c55e',
                    sourceBg: '#1a2744'
                }
            }
        }, (error, result) => {
            if (error) {
                uploadStatus.textContent = 'Upload failed: ' + error.message;
                uploadStatus.className = 'upload-status error';
                return;
            }
            if (result && result.event === 'success') {
                uploadedImageUrl.value = result.info.secure_url;
                imagePreview.src = result.info.secure_url;
                imagePreview.style.display = 'block';
                uploadStatus.textContent = 'Image uploaded successfully!';
                uploadStatus.className = 'upload-status success';
            }
        });

        imageUploadArea.addEventListener('click', () => {
            cloudinaryWidget.open();
        });

        // ========== ADD PROJECT ==========
        btnSubmit.addEventListener('click', () => {
            const image = uploadedImageUrl.value;
            const name = projectName.value.trim();
            const description = projectDescription.value.trim();
            const amount = projectAmount.value.trim();

            if (!image) {
                uploadStatus.textContent = 'Please upload an image first.';
                uploadStatus.className = 'upload-status error';
                return;
            }
            if (!name || !description || !amount) {
                alert('Please fill in all fields.');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

            const newProjectRef = db.ref('projects').push();
            newProjectRef.set({
                image: image,
                name: name,
                description: description,
                amount: parseFloat(amount).toFixed(2),
                createdAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                // Reset form
                uploadedImageUrl.value = '';
                imagePreview.style.display = 'none';
                imagePreview.src = '';
                uploadStatus.textContent = 'Project added!';
                uploadStatus.className = 'upload-status success';
                projectName.value = '';
                projectDescription.value = '';
                projectAmount.value = '';
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-plus-circle"></i> Add Project';
                setTimeout(() => {
                    uploadStatus.textContent = '';
                }, 3000);
            }).catch((error) => {
                console.error('Error adding project:', error);
                alert('Failed to add project: ' + error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fas fa-plus-circle"></i> Add Project';
            });
        });

        // ========== LOAD PROJECTS LIST ==========
        function loadProjectsList() {
            db.ref('projects').on('value', (snapshot) => {
                const data = snapshot.val();
                projectsList.innerHTML = '';

                if (!data) {
                    projectsList.innerHTML =
                        '<div class="no-projects"><i class="fas fa-folder-open" style="display:block; margin-bottom:8px; color:var(--gold); font-size:2rem;"></i>No projects yet. Add your first one!</div>';
                    return;
                }

                const projects = Object.entries(data).reverse();
                projects.forEach(([key, project]) => {
                    const item = document.createElement('div');
                    item.className = 'project-list-item';
                    item.innerHTML = `
                                <img src="${project.image || 'https://i.ibb.co/svxj52ny/seedwel.png'}" 
                                     alt="${project.name}" 
                                     onerror="this.src='https://i.ibb.co/svxj52ny/seedwel.png'; this.style.objectFit='contain';">
                                <div class="project-list-info">
                                    <h5>${project.name || 'Untitled'}</h5>
                                    <p>$${project.amount || '0'} · ${project.description ? project.description.substring(0, 40) + '...' : 'No description'}</p>
                                </div>
                                <button class="btn-delete" data-key="${key}">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            `;
                    projectsList.appendChild(item);
                });

                // Delete listeners
                projectsList.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const key = btn.dataset.key;
                        if (confirm('Are you sure you want to delete this project?')) {
                            db.ref('projects/' + key).remove()
                                .then(() => console.log('Project deleted'))
                                .catch(err => alert('Error: ' + err.message));
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
